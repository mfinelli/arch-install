---
- name: Installing systemd-cryptsetup
  ansible.builtin.apt:
    name: systemd-cryptsetup
    state: present

- name: Installing zfs
  when: ansible_hostname in base_zfs_hosts
  ansible.builtin.apt:
    name:
      - linux-headers-amd64
      - zfs-dkms
      - zfs-utils
      - zfs-zed
    state: present

- name: Add zfs unlock unit
  when: ansible_hostname in base_zfs_hosts
  ansible.builtin.copy:
    dest: /etc/systemd/system/zfs-unlock@.service
    owner: root
    group: root
    mode: "0644"
    src: zfs-unlock.service

- name: Enable zfs unlock services
  when: ansible_hostname in base_zfs_hosts
  ansible.builtin.systemd:
    name: zfs-unlock@{{ item }}.service
    enabled: true

- name: Setting getent facts
  ansible.builtin.getent:
    database: "{{ item }}"
  loop:
    - group
    - passwd

- name: Get LUKS device-mapper name for root disk
  ansible.builtin.shell:
    cmd: |
      set -e -o pipefail
      ROOT_LV=$(findmnt -n -o SOURCE /)
      VG=$(lvs --noheadings -o vg_name "$ROOT_LV" | tr -d ' ')
      PV=$(pvs --noheadings -o pv_name -S "vg_name=$VG" | tr -d ' ')
      lsblk -ln -o NAME,TYPE "$PV" | awk '$2 == "crypt" {print $1}'
  register: base_dmsetup_output
  changed_when: false

- name: Set dm_name fact
  ansible.builtin.set_fact:
    base_root_dm_name: "{{ base_dmsetup_output.stdout }}"

- name: Get LUKS partition UUID for root volume
  ansible.builtin.command:
    cmd: >-
      blkid -s UUID -o value
      /dev/{{ base_root_dm_name | regex_replace('_crypt$', '') }}
  register: base_blkid_output
  changed_when: false

- name: Set luks_uuid fact
  ansible.builtin.set_fact:
    base_root_luks_uuid: "{{ base_blkid_output.stdout }}"

- name: Creating mount directories
  when: ansible_hostname in base_attached_storage
  ansible.builtin.file:
    state: directory
    path: "{{ item.mountpoint }}"
    owner: "{{ item.owner if item.owner is defined and item.owner in
      ansible_facts.get('getent_passwd', {}) else 'root' }}"
    group: "{{ item.group if item.group is defined and item.group in
      ansible_facts.get('getent_group', {}) else 'root' }}"
    mode: "0755"
  loop: "{{ base_attached_storage[ansible_hostname] }}"

- name: Checking if devices exist
  when: ansible_hostname in base_attached_storage
  ansible.builtin.stat:
    path: /dev/disk/by-partlabel/{{ item.label }}
    get_mime: false
    get_attributes: false
    get_checksum: false
  loop: "{{ base_attached_storage[ansible_hostname] }}"
  register: base_attached_storage_device_lookup

- name: Checking if keyfiles exist
  when: ansible_hostname in base_attached_storage
  ansible.builtin.stat:
    path: "{{ item.keyfile }}"
    get_mime: false
    get_attributes: false
    get_checksum: false
  loop: "{{ base_attached_storage[ansible_hostname] }}"
  register: base_attached_storage_keyfile_lookup

- name: Setting fact for easier lookup
  ansible.builtin.set_fact:
    base_attached_storage_lookups: {}

- name: Building lookups variable
  when: ansible_hostname in base_attached_storage
  ansible.builtin.set_fact:
    base_attached_storage_lookups: '{{ base_attached_storage_lookups |
      combine({item.name: {"device":
      (base_attached_storage_device_lookup.results |
      selectattr(''item.name'', ''=='', item.name) | map(attribute=''stat'') |
      first).exists, "keyfile":
      (base_attached_storage_keyfile_lookup.results |
      selectattr(''item.name'', ''=='', item.name) | map(attribute=''stat'') |
      first).exists}}, recursive=True) }}'
  loop: "{{ base_attached_storage[ansible_hostname] }}"

- name: Copying updated crypttab
  become: true
  ansible.builtin.template:
    dest: /etc/crypttab
    group: root
    mode: "0600"
    owner: root
    src: crypttab.j2

- name: Updating fstab for attached storage
  become: true
  ansible.posix.mount:
    path: "{{ item.mountpoint }}"
    src: /dev/mapper/{{ item.name }}
    fstype: "{{ item.fstype }}"
    opts: "{{ base_attached_storage_options[item.fstype] }}"
    dump: 0
    passno: "{% if item.fstype == 'btrfs' %}0{% else %}2{% endif %}"
    state: present
  loop: "{{ base_attached_storage[ansible_hostname] }}"
  when:
    - ansible_hostname in base_attached_storage
    - base_attached_storage_lookups.get(item.name, {}).get('device')
    - base_attached_storage_lookups.get(item.name, {}).get('keyfile')
